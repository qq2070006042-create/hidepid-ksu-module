name: Build KO

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "ko/**"
      - "webroot/**"
      - "module.prop"
      - "service.sh"
      - "hidepid.sh"
      - "uninstall.sh"
      - "hidepid.json"
      - ".github/workflows/build-ko.yml"

permissions:
  contents: read

jobs:
  build-ko:
    name: Build ${{ matrix.kmi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run static checks
        run: |
          node tests/check-github-workflow.js
          node tests/check-c-comments.js
          node tests/check-kernel-source.js
          bash -n src/build-all.sh
          bash -n src/build-module.sh
          bash -n service.sh
          bash -n hidepid.sh
          bash -n uninstall.sh

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Install ddk
        run: |
          sudo curl -fsSL https://raw.githubusercontent.com/Ylarod/ddk/main/scripts/ddk -o /usr/local/bin/ddk
          sudo chmod +x /usr/local/bin/ddk
          mkdir -p ~/.ddk
          echo docker > ~/.ddk/mode
          echo github > ~/.ddk/source
          ddk --help >/dev/null

      - name: Pull KMI
        run: ddk pull "${{ matrix.kmi }}"

      - name: Build ko
        run: |
          chmod +x src/build-all.sh
          cd src
          HIDE_STEALTH=1 ./build-all.sh "${{ matrix.kmi }}"

      - name: Check ko exists
        run: test -f "src/hidepid-${{ matrix.kmi }}.ko"

      - name: Upload ko
        uses: actions/upload-artifact@v6
        with:
          name: ko-${{ matrix.kmi }}
          path: src/hidepid-${{ matrix.kmi }}.ko
          if-no-files-found: error

  package:
    name: Package KernelSU module
    runs-on: ubuntu-latest
    needs: build-ko

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all ko
        uses: actions/download-artifact@v7
        with:
          pattern: ko-*
          path: ko
          merge-multiple: true

      - name: List ko files
        run: |
          ls -lh ko
          test -f ko/hidepid-android12-5.10.ko
          test -f ko/hidepid-android13-5.10.ko
          test -f ko/hidepid-android13-5.15.ko
          test -f ko/hidepid-android14-5.15.ko
          test -f ko/hidepid-android14-6.1.ko
          test -f ko/hidepid-android15-6.6.ko
          test -f ko/hidepid-android16-6.12.ko

      - name: Package zip
        run: |
          rm -f ko/README.txt
          chmod +x service.sh uninstall.sh hidepid.sh
          zip -r hidepid-ksu-module-stealth.zip \
            module.prop \
            service.sh \
            uninstall.sh \
            hidepid.sh \
            hidepid.json \
            ko/ \
            webroot/

      - name: Upload module zip
        uses: actions/upload-artifact@v6
        with:
          name: hidepid-ksu-module-stealth
          path: hidepid-ksu-module-stealth.zip
          if-no-files-found: error
